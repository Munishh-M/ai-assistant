<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Terminal — AI Assistant</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Auth screen: shown until the user logs in or signs up -->
  <div class="app auth-screen" id="authScreen">
    <div class="auth-card">
      <div class="brand">
        <span class="brand-mark">▍</span>
        <span class="brand-name"> Vanakkam da mapla </span>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" type="button">LOG IN</button>
        <button class="auth-tab" id="tabSignup" type="button">SIGN UP</button>
      </div>

      <form id="authForm">
        <label class="auth-label" for="authEmail">Email</label>
        <input type="email" id="authEmail" placeholder="you@example.com" required autocomplete="email" />

        <label class="auth-label" for="authPassword">Password</label>
        <input type="password" id="authPassword" placeholder="••••••••" required autocomplete="current-password" minlength="6" />

        <p class="auth-error" id="authError"></p>

        <button type="submit" id="authSubmit" class="auth-submit">LOG IN</button>
      </form>
    </div>
  </div>

  <!-- Chat screen: shown once logged in -->
  <div class="app" id="chatScreen" style="display: none;">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">▍</span>
        <span class="brand-name">TERMINAL</span>
      </div>
      <div class="status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">checking connection…</span>
      </div>
      <button class="logout-btn" id="logoutBtn" type="button">LOG OUT</button>
    </header>

    <main class="chat" id="chat">
      <div class="msg assistant">
        <div class="msg-role">ASSISTANT</div>
        <div class="msg-body">Hey — I'm your assistant. Ask me anything to get started.</div>
      </div>
    </main>

    <form class="composer" id="composer">
      <span class="prompt-char">›</span>
      <textarea
        id="input"
        placeholder="Type a message…"
        rows="1"
        autofocus
      ></textarea>
      <button type="submit" id="sendBtn" aria-label="Send">SEND</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
